name: service-desk-api

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-servicedesk}
      POSTGRES_USER: ${POSTGRES_USER:-servicedesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servicedesk}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-servicedesk} -d ${POSTGRES_DB:-servicedesk}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0},api,nginx
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:18220,http://127.0.0.1:18220}
      POSTGRES_DB: ${POSTGRES_DB:-servicedesk}
      POSTGRES_USER: ${POSTGRES_USER:-servicedesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servicedesk}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/1}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      ASYNC_TASKS_ENABLED: ${ASYNC_TASKS_ENABLED:-1}
      JSON_LOGS: ${JSON_LOGS:-1}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-ID}
      APP_VERSION: ${APP_VERSION:-2.0.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-1}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-service-desk-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      RUN_MIGRATIONS: "1"
    command:
      [
        "gunicorn",
        "config.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "3",
        "--access-logfile",
        "-",
        "--error-logfile",
        "-",
      ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0},api,nginx
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:18220,http://127.0.0.1:18220}
      POSTGRES_DB: ${POSTGRES_DB:-servicedesk}
      POSTGRES_USER: ${POSTGRES_USER:-servicedesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servicedesk}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/1}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      ASYNC_TASKS_ENABLED: ${ASYNC_TASKS_ENABLED:-1}
      JSON_LOGS: ${JSON_LOGS:-1}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-ID}
      APP_VERSION: ${APP_VERSION:-2.0.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-1}
      OTEL_SERVICE_NAME: service-desk-api-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      RUN_MIGRATIONS: "0"
    command: ["celery", "-A", "config", "worker", "--loglevel=INFO", "--concurrency=2"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, sys; os.environ.setdefault('DJANGO_SETTINGS_MODULE','config.settings'); import django; django.setup(); from config.runtime import database_is_available, redis_is_available; redis_ok = redis_is_available(); sys.exit(0 if database_is_available() and redis_ok in (True, None) else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  beat:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0},api,nginx
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:18220,http://127.0.0.1:18220}
      POSTGRES_DB: ${POSTGRES_DB:-servicedesk}
      POSTGRES_USER: ${POSTGRES_USER:-servicedesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servicedesk}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/1}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      ASYNC_TASKS_ENABLED: ${ASYNC_TASKS_ENABLED:-1}
      JSON_LOGS: ${JSON_LOGS:-1}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-ID}
      APP_VERSION: ${APP_VERSION:-2.0.0}
      TRACING_ENABLED: ${TRACING_ENABLED:-1}
      OTEL_SERVICE_NAME: service-desk-api-scheduler
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      RUN_MIGRATIONS: "0"
    command: ["python", "manage.py", "run_scheduler"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, sys; os.environ.setdefault('DJANGO_SETTINGS_MODULE','config.settings'); import django; django.setup(); from config.runtime import database_is_available, redis_is_available; redis_ok = redis_is_available(); sys.exit(0 if database_is_available() and redis_ok in (True, None) else 1)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "18220:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "19220:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.28.1
    restart: unless-stopped
    ports:
      - "19223:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --cluster.listen-address=
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana-oss:11.5.2
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      alertmanager:
        condition: service_started
      tempo:
        condition: service_started
    ports:
      - "13180:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin12345
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector/config.yml"]
    volumes:
      - ./otel-collector/config.yml:/etc/otel-collector/config.yml:ro

  tempo:
    image: grafana/tempo:2.7.2
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yml"]
    ports:
      - "13241:3200"
    volumes:
      - ./tempo/config.yml:/etc/tempo/config.yml:ro

volumes:
  pgdata:
