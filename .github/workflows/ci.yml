name: service-desk-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src tools

      - name: Django checks
        env:
          DJANGO_SECRET_KEY: ci-secret-key-change-me-please-at-least-32-characters
        run: python src/manage.py check

      - name: Hardening policy check
        run: python tools/hardening_check.py

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key-change-me-please-at-least-32-characters
        run: python src/manage.py test

  compose-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose config

      - name: Start stack
        run: docker compose up -d --build

      - name: Run compose smoke
        run: python tools/smoke_check.py --seed-demo-data

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
