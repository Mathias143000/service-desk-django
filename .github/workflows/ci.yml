name: service-desk-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src

      - name: Django checks
        env:
          DJANGO_SECRET_KEY: ci-secret-key-change-me-please-at-least-32-characters
        run: python src/manage.py check

      - name: Run tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key-change-me-please-at-least-32-characters
        run: python src/manage.py test
